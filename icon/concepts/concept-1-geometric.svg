<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a14;stop-opacity:1" />
    </linearGradient>

    <!-- Crimson glow gradient -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#dc2844;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#dc2844;stop-opacity:0" />
    </radialGradient>

    <!-- Crimson accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3d54;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2844;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bgGradient)" />

  <!-- Outer glow effect -->
  <circle cx="512" cy="512" r="340" fill="url(#glowGradient)" />

  <!-- Main geometric symbol: Crosshair/Kill Switch Power Symbol -->

  <!-- Outer ring (structural) -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#e8e8e8" stroke-width="24" opacity="0.95" />

  <!-- Inner accent ring -->
  <circle cx="512" cy="512" r="240" fill="none" stroke="url(#accentGradient)" stroke-width="18" opacity="0.9" />

  <!-- Vertical line (power symbol top element) -->
  <line x1="512" y1="180" x2="512" y2="300" stroke="url(#accentGradient)" stroke-width="32" stroke-linecap="round" />

  <!-- Horizontal line (crosshair) -->
  <line x1="300" y1="512" x2="724" y2="512" stroke="#e8e8e8" stroke-width="28" stroke-linecap="round" opacity="0.85" />

  <!-- Diagonal cross (X) - left to right -->
  <line x1="340" y1="380" x2="684" y2="644" stroke="url(#accentGradient)" stroke-width="26" stroke-linecap="round" opacity="0.8" />

  <!-- Diagonal cross (X) - right to left -->
  <line x1="684" y1="380" x2="340" y2="644" stroke="url(#accentGradient)" stroke-width="26" stroke-linecap="round" opacity="0.8" />

  <!-- Center target circle (kill zone) -->
  <circle cx="512" cy="512" r="60" fill="none" stroke="#dc2844" stroke-width="20" />

  <!-- Center power dot -->
  <circle cx="512" cy="512" r="28" fill="#dc2844" opacity="0.95" />

  <!-- Small accent circles at cardinal points (geometric detail) -->
  <circle cx="512" cy="270" r="22" fill="#e8e8e8" opacity="0.7" />
  <circle cx="754" cy="512" r="22" fill="#dc2844" opacity="0.7" />
  <circle cx="512" cy="754" r="22" fill="#e8e8e8" opacity="0.7" />
  <circle cx="270" cy="512" r="22" fill="#dc2844" opacity="0.7" />
</svg>
