name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: xcodebuild build -project Reaper.xcodeproj -scheme Reaper -configuration Debug

      - name: Test
        run: xcodebuild test -project Reaper.xcodeproj -scheme ReaperTests -configuration Debug
