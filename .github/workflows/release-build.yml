name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set version
        id: version
        run: echo "tag=$(date -u +'%Y%m%d.%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Inject version and Sparkle public key into Info.plist
        env:
          SPARKLE_EDDSA_PUBLIC_KEY: ${{ secrets.SPARKLE_EDDSA_PUBLIC_KEY }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG" Reaper/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $TAG" Reaper/Info.plist
          /usr/libexec/PlistBuddy -c "Set :SUPublicEDKey $SPARKLE_EDDSA_PUBLIC_KEY" Reaper/Info.plist

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release
        run: xcodebuild build -project Reaper.xcodeproj -scheme Reaper -configuration Release -derivedDataPath .build

      - name: Generate app icon
        run: |
          ICON_SRC="icon/reaper-icon-1024.png"
          ICONSET="Reaper.iconset"
          mkdir -p "$ICONSET"
          sips -z 16 16     "$ICON_SRC" --out "$ICONSET/icon_16x16.png"
          sips -z 32 32     "$ICON_SRC" --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32     "$ICON_SRC" --out "$ICONSET/icon_32x32.png"
          sips -z 64 64     "$ICON_SRC" --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128   "$ICON_SRC" --out "$ICONSET/icon_128x128.png"
          sips -z 256 256   "$ICON_SRC" --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256   "$ICON_SRC" --out "$ICONSET/icon_256x256.png"
          sips -z 512 512   "$ICON_SRC" --out "$ICONSET/icon_256x256@2x.png"
          sips -z 512 512   "$ICON_SRC" --out "$ICONSET/icon_512x512.png"
          sips -z 1024 1024 "$ICON_SRC" --out "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o Reaper.icns

          # Replace icon in built app
          APP=".build/Build/Products/Release/Reaper.app"
          cp Reaper.icns "$APP/Contents/Resources/AppIcon.icns"

      - name: Codesign
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          ENTITLEMENTS="Reaper/Reaper.entitlements"
          APP=".build/Build/Products/Release/Reaper.app"

          # Sign all nested executables, XPC services, dylibs, and frameworks (deepest first)
          find "$APP/Contents" \( -name "*.xpc" -o -name "*.dylib" -o -name "*.framework" \) -print0 | \
            sort -rz | while IFS= read -r -d '' item; do
            codesign --force --sign "$IDENTITY" --options runtime --timestamp "$item"
          done

          # Sign the main app
          codesign --force --sign "$IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --timestamp \
            --deep \
            "$APP"

      - name: Verify codesign
        run: codesign -dvv .build/Build/Products/Release/Reaper.app

      - name: Package for notarization
        run: ditto -c -k --sequesterRsrc --keepParent .build/Build/Products/Release/Reaper.app Reaper.zip

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          RESULT=$(xcrun notarytool submit Reaper.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)
          echo "$RESULT"

          ID=$(echo "$RESULT" | grep "id:" | head -1 | awk '{print $2}')
          STATUS=$(echo "$RESULT" | grep "status:" | tail -1 | awk '{print $2}')

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            echo "Fetching notarization log..."
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi

      - name: Wait for ticket propagation
        run: |
          echo "Waiting 60s for Apple notarization ticket to propagate..."
          sleep 60

      - name: Staple
        continue-on-error: true
        run: |
          for i in $(seq 1 5); do
            if xcrun stapler staple .build/Build/Products/Release/Reaper.app; then
              exit 0
            fi
            echo "Staple attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "::warning::Stapling failed — app is still notarized and will work, Gatekeeper checks online instead"
          exit 1

      - name: Re-package with stapled ticket
        run: |
          rm Reaper.zip
          ditto -c -k --sequesterRsrc --keepParent .build/Build/Products/Release/Reaper.app Reaper.zip

      - name: Sign update with EdDSA (Sparkle)
        id: sparkle_sign
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          SPARKLE_VERSION="2.6.0"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          SIGN_OUTPUT=$("$RUNNER_TEMP/sparkle/bin/sign_update" Reaper.zip --ed-key-file <(echo "$SPARKLE_EDDSA_PRIVATE_KEY"))
          EDDSA_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          echo "signature=$EDDSA_SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Compute file size
        id: filesize
        run: echo "size=$(stat -f%z Reaper.zip)" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 Reaper.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          FULL_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA=$(echo "$FULL_SHA" | cut -c1-7)
          gh release create "$TAG" \
            --title "Reaper ${TAG}" \
            --notes "Automated build from main (${SHORT_SHA}). Signed and notarized." \
            --target "${FULL_SHA}" \
            Reaper.zip

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="https://github.com/nclandrei/reaper/releases/download/${TAG}/Reaper.zip"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nclandrei/homebrew-tap.git" "$RUNNER_TEMP/homebrew-tap"

          CASK_FILE="$RUNNER_TEMP/homebrew-tap/Casks/reaper.rb"
          {
            echo "cask \"reaper\" do"
            echo "  version \"${TAG#v}\""
            echo "  sha256 \"${SHA256}\""
            echo ""
            echo "  url \"${URL}\""
            echo "  name \"Reaper\""
            echo "  desc \"macOS menu bar process killer with one-click quit\""
            echo "  homepage \"https://github.com/nclandrei/reaper\""
            echo ""
            echo "  depends_on macos: \">= :sonoma\""
            echo ""
            echo "  app \"Reaper.app\""
            echo ""
            echo "  zap trash: ["
            echo "    \"~/Library/Preferences/com.nclandrei.reaper.plist\","
            echo "  ]"
            echo "end"
          } > "$CASK_FILE"

          cd "$RUNNER_TEMP/homebrew-tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/reaper.rb
          git commit -m "Update reaper to ${TAG}"
          git push

      - name: Update appcast
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          SIZE="${{ steps.filesize.outputs.size }}"
          SIGNATURE="${{ steps.sparkle_sign.outputs.signature }}"
          URL="https://github.com/nclandrei/reaper/releases/download/${TAG}/Reaper.zip"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")
          VERSION="${TAG#v}"

          python3 -c "
          import sys
          item = '''    <item>
              <title>Reaper $TAG</title>
              <pubDate>$PUB_DATE</pubDate>
              <sparkle:version>$VERSION</sparkle:version>
              <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
              <enclosure
                url=\"$URL\"
                length=\"$SIZE\"
                type=\"application/octet-stream\"
                sparkle:edSignature=\"$SIGNATURE\"
              />
            </item>
          '''
          with open('docs/appcast.xml', 'r') as f:
              content = f.read()
          content = content.replace('</channel>', item + '  </channel>')
          with open('docs/appcast.xml', 'w') as f:
              f.write(content)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast for ${TAG}"
          git push origin HEAD:main

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
