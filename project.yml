name: Reaper
options:
  bundleIdPrefix: com.reaper
  deploymentTarget:
    macOS: "14.0"
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  ReaperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ReaperTests
    dependencies:
      - target: Reaper
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
  Reaper:
    type: application
    platform: macOS
    sources:
      - path: Reaper
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    info:
      path: Reaper/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Reaper
        CFBundleName: Reaper
        NSHumanReadableCopyright: "Copyright © 2024 Reaper. MIT License."
        SUFeedURL: "https://nclandrei.github.io/reaper/appcast.xml"
        SUPublicEDKey: "SU4twrmGM15DiAOL4K8G2tkvBNzDlj3SBahqnwEqYxg="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.reaper.app
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_ENTITLEMENTS: Reaper/Reaper.entitlements
