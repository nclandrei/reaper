<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a14;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2844;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#dc2844;stop-opacity:0" />
    </linearGradient>

    <filter id="crimsonGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgGradient)"/>

  <!-- Subtle glow accent -->
  <rect width="1024" height="1024" rx="220" fill="url(#glowGradient)"/>

  <!-- Crimson accent line (underline) -->
  <line x1="200" y1="750" x2="824" y2="750" stroke="#dc2844" stroke-width="16" stroke-linecap="round" opacity="0.6"/>

  <!-- Main stylized R -->
  <g filter="url(#crimsonGlow)">
    <text
      x="512"
      y="720"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-size="680"
      font-weight="900"
      fill="#ffffff"
      text-anchor="middle"
      dominant-baseline="middle"
      letter-spacing="-20"
    >R</text>
  </g>

  <!-- Crimson accent dot (top right of R) -->
  <circle cx="780" cy="240" r="28" fill="#dc2844" opacity="0.8"/>

  <!-- Subtle slash through R (modern stylization) -->
  <line x1="320" y1="500" x2="700" y2="900" stroke="#dc2844" stroke-width="18" stroke-linecap="round" opacity="0.15"/>
</svg>
