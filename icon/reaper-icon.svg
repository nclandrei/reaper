<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a16"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ff2244"/>
      <stop offset="100%" stop-color="#8833cc"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#556"/>
      <stop offset="100%" stop-color="#334"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ff6688"/>
      <stop offset="100%" stop-color="#ff2244" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.35" cy="0.3" r="0.35">
      <stop offset="0%" stop-color="#ff2244" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff2244" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <rect width="1024" height="1024" rx="220" fill="url(#glow)"/>
  <!-- Shaft — diagonal, bottom-right to upper-center -->
  <line x1="640" y1="800" x2="440" y2="310" stroke="url(#shaft)" stroke-width="40" stroke-linecap="round"/>
  <!-- Blade — bold sweeping crescent -->
  <path d="
    M 440 310
    C 430 260, 380 180, 280 160
    C 190 145, 130 200, 130 290
    C 130 380, 200 440, 310 420
    C 370 410, 410 370, 430 330
    Z
  " fill="url(#blade)"/>
  <!-- Blade cutting edge highlight -->
  <path d="
    M 280 160
    C 190 145, 130 200, 130 290
    C 130 380, 200 440, 310 420
  " stroke="url(#edge)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Inner blade shine -->
  <path d="
    M 320 190
    C 240 180, 180 220, 170 290
    C 165 340, 200 390, 280 390
  " stroke="rgba(255,255,255,0.1)" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
