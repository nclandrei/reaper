<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  body { background: #333; display: flex; gap: 40px; padding: 40px; flex-wrap: wrap; }
  .icon {
    width: 1024px;
    height: 1024px;
    border-radius: 220px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #1c1c30, #0a0a14);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .icon::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 35% 30%, rgba(220, 40, 60, 0.18) 0%, transparent 60%);
  }
  .skull {
    font-size: 520px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 8px 40px rgba(220, 40, 60, 0.4))
            drop-shadow(0 0 80px rgba(220, 40, 60, 0.15));
    margin-top: -20px;
  }
</style>
</head>
<body>
  <div class="icon" id="icon">
    <span class="skull">💀</span>
  </div>
</body>
</html>
