<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Reaper — Logo Concepts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #111; color: #fff; padding: 40px; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
  .sub { color: #888; font-size: 13px; margin-bottom: 40px; }
  .concepts { display: flex; gap: 32px; margin-bottom: 48px; }
  .concept {
    flex: 1;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 24px;
    background: #0a0a14;
  }
  .concept-label {
    font-size: 14px; font-weight: 600; color: #aab;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .sizes { display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; }
  .size-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .size-item img { border-radius: 22%; }
  .size-label { font-size: 10px; color: #555; }
  .surface { margin-bottom: 20px; }
  .surface-label { font-size: 11px; color: #666; margin-bottom: 10px; text-transform: uppercase; }
  .light-bg { background: #f0f0f4; border-radius: 12px; padding: 16px; }
  .light-bg .size-label { color: #999; }
</style>
</head>
<body>
  <h1>Reaper — Logo Concepts</h1>
  <p class="sub">3 directions. Dark and light surfaces. Multiple sizes to test readability.</p>

  <div class="concepts">
    <div class="concept">
      <div class="concept-label">1 — Geometric (Power/Crosshair)</div>
      <div class="surface">
        <div class="surface-label">Dark</div>
        <div class="sizes">
          <div class="size-item"><img src="concept-1-geometric.svg" width="200" height="200"><span class="size-label">200</span></div>
          <div class="size-item"><img src="concept-1-geometric.svg" width="128" height="128"><span class="size-label">128</span></div>
          <div class="size-item"><img src="concept-1-geometric.svg" width="64" height="64"><span class="size-label">64</span></div>
          <div class="size-item"><img src="concept-1-geometric.svg" width="32" height="32"><span class="size-label">32</span></div>
          <div class="size-item"><img src="concept-1-geometric.svg" width="16" height="16"><span class="size-label">16</span></div>
        </div>
      </div>
      <div class="surface">
        <div class="surface-label">Light</div>
        <div class="light-bg">
          <div class="sizes">
            <div class="size-item"><img src="concept-1-geometric.svg" width="128" height="128"><span class="size-label">128</span></div>
            <div class="size-item"><img src="concept-1-geometric.svg" width="64" height="64"><span class="size-label">64</span></div>
            <div class="size-item"><img src="concept-1-geometric.svg" width="32" height="32"><span class="size-label">32</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="concept">
      <div class="concept-label">2 — Lettermark 'R'</div>
      <div class="surface">
        <div class="surface-label">Dark</div>
        <div class="sizes">
          <div class="size-item"><img src="concept-2-lettermark.svg" width="200" height="200"><span class="size-label">200</span></div>
          <div class="size-item"><img src="concept-2-lettermark.svg" width="128" height="128"><span class="size-label">128</span></div>
          <div class="size-item"><img src="concept-2-lettermark.svg" width="64" height="64"><span class="size-label">64</span></div>
          <div class="size-item"><img src="concept-2-lettermark.svg" width="32" height="32"><span class="size-label">32</span></div>
          <div class="size-item"><img src="concept-2-lettermark.svg" width="16" height="16"><span class="size-label">16</span></div>
        </div>
      </div>
      <div class="surface">
        <div class="surface-label">Light</div>
        <div class="light-bg">
          <div class="sizes">
            <div class="size-item"><img src="concept-2-lettermark.svg" width="128" height="128"><span class="size-label">128</span></div>
            <div class="size-item"><img src="concept-2-lettermark.svg" width="64" height="64"><span class="size-label">64</span></div>
            <div class="size-item"><img src="concept-2-lettermark.svg" width="32" height="32"><span class="size-label">32</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="concept">
      <div class="concept-label">3 — Negative Space (Power Cutout)</div>
      <div class="surface">
        <div class="surface-label">Dark</div>
        <div class="sizes">
          <div class="size-item"><img src="concept-3-negative-space.svg" width="200" height="200"><span class="size-label">200</span></div>
          <div class="size-item"><img src="concept-3-negative-space.svg" width="128" height="128"><span class="size-label">128</span></div>
          <div class="size-item"><img src="concept-3-negative-space.svg" width="64" height="64"><span class="size-label">64</span></div>
          <div class="size-item"><img src="concept-3-negative-space.svg" width="32" height="32"><span class="size-label">32</span></div>
          <div class="size-item"><img src="concept-3-negative-space.svg" width="16" height="16"><span class="size-label">16</span></div>
        </div>
      </div>
      <div class="surface">
        <div class="surface-label">Light</div>
        <div class="light-bg">
          <div class="sizes">
            <div class="size-item"><img src="concept-3-negative-space.svg" width="128" height="128"><span class="size-label">128</span></div>
            <div class="size-item"><img src="concept-3-negative-space.svg" width="64" height="64"><span class="size-label">64</span></div>
            <div class="size-item"><img src="concept-3-negative-space.svg" width="32" height="32"><span class="size-label">32</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
